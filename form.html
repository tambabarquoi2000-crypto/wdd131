<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review Form</title>
    <meta name="author" content="Tamba Barquoi">
    <meta name="description" content="This is a review for that is going to get reviews from our users inorde to better the page.">

    <link rel="stylesheet" href="styles/form.css">
    <link rel="stylesheet" href="styles/form-large.css">

    <script src="scripts/form.js" defer></script>

    <script src="scripts/temples.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Cascadia+Mono:ital,wght@0,200..700;1,200..700&family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Archivo:ital,wght@0,100..900;1,100..900&family=Cascadia+Mono:ital,wght@0,200..700;1,200..700&family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <p>Review Form</p>
        <button type="button" id="menu"></button>
        <nav>
            <ul class="navigation">
                <li><a href="#">Home</a></li>
                <li><a href="#">Old</a></li>
                <li><a href="#" class="active">New</a></li>
                <li><a href="#">Large</a></li>
                <li><a href="#">Small</a></li>
            </ul>
        </nav>
    </header>
    <main>

        <h1>Product Reveiw</h1>
        <form method="get" action="review.html" class="review">
            <div>
                <label for="products">Product Name
                <select id="products" name="selected-product" required>
                    <option value="" selected disabled>Select a product</option>
                    
                </select>
                </label>
            </div>

            <div class="ratting">
                <div><label for="rate">⭐<input type="radio" name="rate" value="1" required></label></div>
                <div><label for="rate">⭐⭐<input type="radio" name="rate" value="2" required></label></div>
                <div><label for="rate">⭐⭐⭐⭐<input type="radio" name="rate" value="3" required></label></div>
                <div><label for="rate">⭐⭐⭐⭐⭐<input type="radio" name="rate" value="4" required></label></div>
                <div><label for="rate">⭐⭐⭐⭐⭐⭐<input type="radio" name="rate" value="5" required></label></div>
            </div>
            <div>
                <label for="install-date">Date of Installation <input type="date" id="install-date" name="install-date" required></label>
            </div>

            <div class="checkbox">
                <label for="duribility"><input type="checkbox" id="duribility" name="duribility" value="yes"> Duribility</label>
                <label for="ease-to-use"><input type="checkbox" id="ease-to-use" name="ease-to-use" value="yes"> Easy to use</label>
                <label for="performance"><input type="checkbox" id="performance" name="performance" value="yes"> Performance</label>
                <label for="design"><input type="checkbox" id="design" name="design" value="yes"> Design</label>
            </div>
            
            <div>
                <label for="wreview">Written Review <span class="highlight">(optional)</span>
                <textarea class="textarea wreview" id="wreview" name="written-review"></textarea></label>
            </div>

            <div>
                <label for="user-name">User Name <span class="highlight">(optional)</span><input type="text" id="user-name" name="user-name"></label>
            </div>

            <div>
                <input id="submit" type="submit" value="Post Review">
            </div>
        </form>

    </main>
    <footer>
        <p>©️ <span id="current-year"></span> | Tamba Barquoi | Liberia</p>
        <p><span id="last-modified"></span></p>
    </footer>
</body>
</html>
